async function openRequestEdit(id){
  const r = await db.getRequest(id);
  if(!r) return;
  const me = session.get();
  const isSuperadmin = me?.role === 'superadmin';
  const [lok, tuj, picUsers, ma, divs, deps] = await Promise.all([
    db.listLokasi(), db.listTujuan(), db.listPicUsers(),
    db.listMataAnggaran(), db.listDivisi(), db.listDepartemen()
  ]);

  // Resolve the divisi for the existing departemen (if any), so the dropdown starts correct
  const initialDivisiId = (() => {
    if(!r.departemen) {
      // user might have selected divisi without departemen; match by name
      const d = divs.find(x => x.name === r.divisi);
      return d ? d.id : '';
    }
    const dep = deps.find(d => d.name === r.departemen);
    return dep ? dep.divisi_id : '';
  })();

  // Pre-format the existing completed_at for display in the optional override input
  const completedLocal = r.completed_at
    ? new Date(r.completed_at).toISOString().slice(0,16)  // for datetime-local input
    : '';

  // v1.7: For DP tickets, check approval status to display a banner in the modal
  let approvalBanner = '';
  if(r.kategori === 'Direct Purchase'){
    let lastApr = null;
    try{
      if(SUPA_CONFIGURED){
        const { data } = await supa.from('approvals').select('*')
          .eq('request_id', r.id).eq('approval_type','dp_prepare')
          .order('requested_at',{ascending:false}).limit(1);
        lastApr = data && data[0];
      }else{
        lastApr = demo.approvals.find(a => a.request_id === r.id && a.approval_type === 'dp_prepare') || null;
      }
    }catch{}

    if(lastApr){
      const userName = (() => {

              <span class="hint">Scan/foto dokumen tanda terima yang sudah ditandatangani.</span>
            </div>
          </div>
        </div>

        ${isSuperadmin && r.completed_at ? `
        <!-- Superadmin-only: completed_at override -->
        <div style="margin-top:14px;padding:14px;border-radius:10px;background:#FEF3C7;border:1px solid #FCD34D">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
            <span class="material-symbols-rounded" style="color:#92400E">history_edu</span>
            <strong style="color:#92400E">Override Tanggal Selesai (Superadmin)</strong>
          </div>
          <p class="muted text-sm" style="margin:0 0 10px">
            Gunakan ini hanya bila tanggal sistem berbeda dari aktual (mis. status di-update terlambat).
            Ini akan memengaruhi perhitungan SLA tiket ini.
          </p>
          <div class="form-grid">
            <div class="field">
              <label>Saat ini tercatat</label>
              <input class="input" disabled value="${fmtDateTime(r.completed_at)}"/>
              ${r.completed_at_edited_by ? `<span class="hint">Pernah diedit oleh superadmin pada ${fmtDateTime(r.completed_at_edited_at)}</span>` : ''}
            </div>
            <div class="field">
              <label>Tanggal/Jam Aktual Selesai</label>
              <input class="input" type="datetime-local" name="completed_at_override" id="ed-completed" value="${completedLocal}"/>
            </div>
            <div class="field full"><label>Alasan Perubahan <span class="hint" style="color:var(--danger)">(wajib bila tanggal diubah)</span></label>
              <textarea class="textarea" name="completed_at_reason" id="ed-completed-reason" placeholder="Mis. status di-update terlambat karena PIC libur Jumat–Senin"></textarea>
            </div>
          </div>
        </div>` : ''}
      </form>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Batal</button>
      <button class="btn btn-primary" id="ed-save"><span class="material-symbols-rounded">save</span>Simpan</button>
    </div>
  `, 'lg');

  // Rupiah formatter
  const angg = $('#ed-anggaran');
  angg.addEventListener('input', e => {
    const d = e.target.value.replace(/\D/g,'');
    e.target.value = d ? 'Rp '+Number(d).toLocaleString('id-ID') : '';
  });

  // Toggle evidence block visibility based on status
  const statusSel = $('#ed-status');
  const evidenceBlock = $('#ed-evidence-block');
  const toggleEvidence = () => {
    evidenceBlock.style.display = (statusSel.value === 'Selesai') ? 'block' : 'none';
  };
  statusSel.addEventListener('change', toggleEvidence);
  toggleEvidence();

  // Cascading dropdown: Divisi → Departemen
  const divisiSel = $('#ed-divisi');
  const departSel = $('#ed-departemen');
  divisiSel?.addEventListener('change', () => {
    const divId = divisiSel.value;
    const opts = deps.filter(d => d.divisi_id === divId);
    departSel.innerHTML = '<option value="">(kosong)</option>' +
      opts.map(d => `<option>${escapeHtml(d.name)}</option>`).join('');
  });

  $('#ed-save').addEventListener('click', async () => {
    const fd = new FormData($('#edit-form'));
    if(!fd.get('keterangan')){ toast('Keterangan wajib diisi','warn'); return; }
    const adjusted = (fd.get('total_anggaran')||'').toString().replace(/\D/g,'');
    // v1.7: PIC role cannot modify the assigned PIC — fall back to the original value
    const isPicRole = me?.role === 'pic';
    const pic_user_id = isPicRole ? (r.pic_user_id || null) : (fd.get('pic_user_id') || null);
    const picUser = picUsers.find(u => u.id === pic_user_id);
    const newStatus = fd.get('status');

    // Resolve divisi name from selected id (form holds the divisi UUID)
    const divisiId = fd.get('divisi') || '';
    const divObj = divs.find(d => d.id === divisiId);

    const patch = {
      kode_smartoffice: fd.get('kode_smartoffice') || null,
      status: newStatus,
      keterangan: fd.get('keterangan'),
      total_anggaran: adjusted ? Number(adjusted) : 0,
      nama_vendor: fd.get('nama_vendor') || null,
      pic_user_id: pic_user_id,
      nama_pic_ga: picUser ? picUser.full_name : (isPicRole ? r.nama_pic_ga : null),
      estimasi_penyelesaian: fd.get('estimasi_penyelesaian') || null,
      lokasi_kebutuhan: fd.get('lokasi_kebutuhan') || null,
      tujuan_kebutuhan: fd.get('tujuan_kebutuhan') || null,
      divisi:        divObj ? divObj.name : null,
      departemen:    fd.get('departemen') || null,
      mata_anggaran: fd.get('mata_anggaran') || null,
      detail_kebutuhan: fd.get('detail_kebutuhan') || null
    };

    // Friendly reminder if user is closing the ticket without evidence (status = Selesai)
    const fotoFile = $('input[name="bukti_foto_file"]')?.files?.[0];
    const ttFile   = $('input[name="bukti_tt_file"]')?.files?.[0];
    if(newStatus === 'Selesai' && !fotoFile && !ttFile && !r.bukti_foto_url && !r.bukti_tt_url){
      const ok = confirm('Anda menyelesaikan tiket tanpa upload bukti (foto atau tanda terima).\n\n'
        + 'Walaupun opsional, bukti sangat membantu audit. Lanjutkan tanpa bukti?');
      if(!ok) return;
    }

    // ===== v1.7: DP Approval workflow =====
    // For Direct Purchase tickets transitioning from "Mencari Penyedia" → "Sedang Disiapkan",
    // approval from Kepala Departemen is required BEFORE the status can be changed.
    // Logic:
    //   - If approval already exists & is "approved" → allow transition
    //   - If approval is "pending" → block, tell user to wait
    //   - If approval is "rejected" → block, prompt to start a new one
    //   - If no approval exists → block, prompt to create approval request (and don't save status change)
    const isDPCategory = r.kategori === 'Direct Purchase';
    const isPrepareTransition = r.status === 'Mencari Penyedia' && newStatus === 'Sedang Disiapkan';
    if(isDPCategory && isPrepareTransition){
      // Check existing approval
      let existing = null;
      try{ existing = await db.getPendingApproval(id, 'dp_prepare'); }catch{}
      // Look for any non-pending decisions too
      let lastDecision = null;
      if(SUPA_CONFIGURED){
        try{
          const { data } = await supa.from('approvals').select('*')
            .eq('request_id', id).eq('approval_type','dp_prepare')
            .order('requested_at',{ascending:false}).limit(1);
          lastDecision = data && data[0];
        }catch{}
      }else{
        lastDecision = demo.approvals.find(a => a.request_id === id && a.approval_type === 'dp_prepare') || null;
      }

      // If there's an approved approval, we're good
      const isApproved = lastDecision && lastDecision.status === 'approved';
      if(!isApproved){
        // Need to either create one or block
        if(existing && existing.status === 'pending'){
          toast('Approval Kepala Departemen masih menunggu — silakan tunggu keputusan.','warn',6000);
          return;
        }
        // Find Kepala Departemen for this request's departemen
        let kepalaUserId = null;
        let kepalaName = null;
        if(r.departemen){
          const dep = deps.find(d => d.name === r.departemen);
          if(dep && dep.kepala_departemen_user_id){
            kepalaUserId = dep.kepala_departemen_user_id;
            const u = picUsers.find(x => x.id === kepalaUserId);
            kepalaName = u ? u.full_name : null;
          }
        }
        if(!kepalaUserId){
          toast('Departemen tiket ini belum memiliki Kepala Departemen. Hubungi superadmin/admin untuk menugaskan.','error',7000);
          return;
        }
        const ok = confirm(
          `Tiket Direct Purchase memerlukan persetujuan Kepala Departemen sebelum dapat lanjut ke "Sedang Disiapkan".\n\n` +
          `Kepala Departemen: ${kepalaName}\n\n` +
          `Klik OK untuk mengirim permintaan persetujuan. Status tetap "Mencari Penyedia" sampai disetujui.`
        );
        if(!ok) return;
        try{
          await db.createApproval({
            request_id: id,
            approval_type: 'dp_prepare',
            approver_user_id: kepalaUserId,
            meta: { from_status:r.status, to_status:newStatus, kode_permintaan:r.kode_permintaan }
          });
          db.logActivity({
            action:'approval.request',
            target_type:'request', target_id:id,
            detail:`Minta persetujuan ${r.kode_permintaan} (DP) → Kepala Departemen ${kepalaName}`,
            meta:{ approver_user_id:kepalaUserId, departemen:r.departemen }
          });
          closeModal();
          toast('Permintaan persetujuan dikirim ke '+kepalaName,'success',5000);
          refreshApprovalBadge(session.get());
        }catch(err){
          toast('Gagal mengirim permintaan persetujuan: '+(err.message||''),'error');
        }
        return;   // Do NOT proceed with status change
      }
      // else: approved → fall through, allow status change
    }
    // ===== /v1.7 DP Approval =====

    // Disable save button to prevent double-submit during upload
    const btn = $('#ed-save');
    btn.disabled = true; btn.innerHTML = '<span class="material-symbols-rounded">hourglass_top</span>Menyimpan...';

    try{
      // Upload evidence files first (if any)
      if(fotoFile){
        try{
          const { url } = await db.uploadEvidence(id, fotoFile, 'foto');
          patch.bukti_foto_url = url;
        }catch(e){ toast('Gagal upload bukti foto: '+(e.message||''),'error'); btn.disabled = false; btn.innerHTML = '<span class="material-symbols-rounded">save</span>Simpan'; return; }
      }
      if(ttFile){
        try{
          const { url } = await db.uploadEvidence(id, ttFile, 'tt');
          patch.bukti_tt_url = url;
        }catch(e){ toast('Gagal upload bukti tanda terima: '+(e.message||''),'error'); btn.disabled = false; btn.innerHTML = '<span class="material-symbols-rounded">save</span>Simpan'; return; }
      }

      const changes = [];
      if(r.status !== patch.status) changes.push(`status: ${r.status} → ${patch.status}`);
      if((r.nama_pic_ga||'') !== (patch.nama_pic_ga||'')) changes.push(`PIC: ${r.nama_pic_ga||'—'} → ${patch.nama_pic_ga||'—'}`);
      if(patch.bukti_foto_url && patch.bukti_foto_url !== r.bukti_foto_url) changes.push('bukti foto diupload');
      if(patch.bukti_tt_url && patch.bukti_tt_url !== r.bukti_tt_url) changes.push('bukti tanda terima diupload');

      await db.updateRequest(id, patch);
      db.logActivity({
        action: r.status !== patch.status ? 'request.status_change' : 'request.update',
        target_type:'request', target_id:id,
        detail: `${r.kode_permintaan}: ${changes.join(' · ') || 'detail diperbarui'}`,
        meta: { from_status:r.status, to_status:patch.status }
      });

      // Handle completed_at override (superadmin only)
      if(isSuperadmin && fd.has('completed_at_override')){
        const newCompleted = fd.get('completed_at_override');
        const newIso = newCompleted ? new Date(newCompleted).toISOString() : null;
        const prevIso = r.completed_at;
        // only act if the value actually changed
        if(newIso && newIso !== prevIso){
          const reason = (fd.get('completed_at_reason') || '').trim();
          if(!reason){
            toast('Alasan perubahan tanggal selesai wajib diisi','warn');
            btn.disabled = false; btn.innerHTML = '<span class="material-symbols-rounded">save</span>Simpan';
            return;
          }
          await db.overrideCompletedAt(id, newIso, reason);
          db.logActivity({
            action:'request.completed_at_override',
            target_type:'request', target_id:id,
            detail:`${r.kode_permintaan}: tanggal selesai ${fmtDateTime(prevIso)} → ${fmtDateTime(newIso)} · alasan: ${reason}`,
            meta:{ from:prevIso, to:newIso, reason }
          });
        }
      }

      _adminReqsCache = await db.listRequests();
      const host = $('#req-table-host'); if(host) renderRequestsTable(host, _adminReqsCache, {compact:false});
      const dh = $('#ads-table-host'); if(dh) renderRequestsTable(dh, _adminReqsCache, {compact:true});
      closeModal();
      toast('Permintaan diperbarui','success');
    }catch(err){
      console.error(err); toast('Gagal menyimpan: '+(err.message||''),'error');
      btn.disabled = false; btn.innerHTML = '<span class="material-symbols-rounded">save</span>Simpan';
    }
  });
}

/* ----------- ADMIN: RATINGS ----------- */
let _ratingsState = { page:1, pageSize:10, sort:'created_at', dir:'desc', search:'' };

async function viewAdminRatings(c){
  c.innerHTML = `
    <div class="card">
      <div class="card-head">
        <h3>Daftar Penilaian</h3>
        <button class="btn btn-ghost btn-sm" id="csv-rate"><span class="material-symbols-rounded" style="font-size:18px">download</span>Download CSV</button>
      </div>
      <div class="card-body">
        <div class="toolbar">
          <div class="search"><span class="material-symbols-rounded">search</span>
            <input type="text" class="input" id="rate-search" placeholder="Cari kode atau pemesan..." />
          </div>
        </div>
        <div id="rate-table-host"></div>
      </div>
    </div>
  `;
  const [reqs, ratings] = await Promise.all([db.listRequests(), db.listRatings()]);
  // Build row set = ALL completed requests, with rating status
  const completed = reqs.filter(r=>r.status==='Selesai');
  const ratingByReq = new Map(ratings.map(rt=>[rt.request_id, rt]));
  const rows = completed.map(r => {
    const rt = ratingByReq.get(r.id);
    return {
      id: r.id,
      kode: r.kode_permintaan,
      kategori: r.kategori,
      pemesan: r.nama_pemesan,
      vendor: r.nama_vendor || '',
      pic_ga: r.nama_pic_ga || '',
      status_nilai: rt ? 'Sudah Dinilai' : 'Belum Dinilai',
      rating: rt ? rt.rating : null,
      kritik: rt ? rt.kritik_saran : '',
      created_at: rt ? rt.created_at : r.created_at,
      _request: r,
      _rating: rt
    };
  });

  function render(){
    const host = $('#rate-table-host');
    const s = _ratingsState;
    let view = rows.slice();
    if(s.search){
      view = view.filter(x =>
        (x.kode||'').toLowerCase().includes(s.search) ||
        (x.pemesan||'').toLowerCase().includes(s.search)
      );
    }
    view.sort((a,b)=>{
      let av=a[s.sort], bv=b[s.sort];
      if(av==null) av=''; if(bv==null) bv='';
      if(typeof av==='string') av=av.toLowerCase();
      if(typeof bv==='string') bv=bv.toLowerCase();
      return av<bv?(s.dir==='asc'?-1:1):av>bv?(s.dir==='asc'?1:-1):0;
    });
    const total = view.length;
    const totalPages = Math.max(1, Math.ceil(total / s.pageSize));
    if(s.page>totalPages) s.page=totalPages;
    const start = (s.page-1)*s.pageSize;
    const slice = view.slice(start, start+s.pageSize);

    const sortIcon = (col) => s.sort===col
      ? `<span class="material-symbols-rounded sort-ic">${s.dir==='asc'?'arrow_drop_up':'arrow_drop_down'}</span>`
      : '<span class="material-symbols-rounded sort-ic">unfold_more</span>';

    host.innerHTML = `
      <div class="table-wrap">
        <table class="t">
          <thead><tr>
            <th style="width:48px">#</th>
            <th class="sortable" data-col="kode">Kode${sortIcon('kode')}</th>
            <th class="sortable" data-col="kategori">Kategori${sortIcon('kategori')}</th>
            <th class="sortable" data-col="pemesan">Pemesan${sortIcon('pemesan')}</th>
            <th>Vendor</th>
            <th>PIC GA</th>
            <th class="sortable" data-col="rating">Rating${sortIcon('rating')}</th>
            <th class="sortable" data-col="status_nilai">Status Penilaian${sortIcon('status_nilai')}</th>
            <th style="text-align:right">Info</th>
          </tr></thead>
          <tbody>
            ${slice.length ? slice.map((x,i)=>`
              <tr>
                <td>${start+i+1}</td>
                <td><span class="code-pill">${escapeHtml(x.kode)}</span></td>
                <td>${escapeHtml(x.kategori)}</td>
                <td>${escapeHtml(x.pemesan)}</td>
                <td>${escapeHtml(x.vendor||'—')}</td>
                <td>${escapeHtml(x.pic_ga||'—')}</td>
                <td>${x.rating ? x.rating + ' ★' : '—'}</td>
                <td>${x.status_nilai==='Sudah Dinilai'
                  ? '<span class="badge status-selesai">Sudah Dinilai</span>'
                  : '<span class="badge status-belum">Belum Dinilai</span>'}</td>
                <td style="text-align:right">
                  <button class="btn-icon" data-id="${x.id}" data-act="info" title="Detail penilaian"><span class="material-symbols-rounded">info</span></button>
                </td>
              </tr>
            `).join('') : `<tr><td colspan="9" class="empty-row">Belum ada data</td></tr>`}
          </tbody>
        </table>
      </div>
      <div class="pagination">
        <div>Menampilkan <strong>${slice.length}</strong> dari <strong>${total}</strong> data</div>
        <div class="pages">
          <button class="page-btn" id="rpg-prev" ${s.page===1?'disabled':''}><span class="material-symbols-rounded" style="font-size:18px">chevron_left</span></button>
          ${Array.from({length:totalPages}).map((_,i)=>`<button class="page-btn ${i+1===s.page?'active':''}" data-page="${i+1}">${i+1}</button>`).join('')}
          <button class="page-btn" id="rpg-next" ${s.page===totalPages?'disabled':''}><span class="material-symbols-rounded" style="font-size:18px">chevron_right</span></button>
        </div>
      </div>
    `;
    $$('th.sortable', host).forEach(th => th.addEventListener('click', ()=>{
      const col = th.dataset.col;
      if(s.sort===col) s.dir = s.dir==='asc'?'desc':'asc';
      else { s.sort = col; s.dir = 'asc'; }
      render();
    }));
    $('#rpg-prev', host)?.addEventListener('click', ()=>{ if(s.page>1){s.page--;render();} });
    $('#rpg-next', host)?.addEventListener('click', ()=>{ if(s.page<totalPages){s.page++;render();} });
    $$('button[data-page]', host).forEach(b => b.addEventListener('click', ()=>{ s.page=Number(b.dataset.page); render(); }));
    $$('button[data-act="info"]', host).forEach(b => b.addEventListener('click', () => {
      const x = rows.find(r=>r.id===b.dataset.id);
      if(!x) return;
      openModal(`
        <div class="modal-head">
          <h3><span class="material-symbols-rounded" style="vertical-align:-6px;color:var(--mrt-blue)">reviews</span> Detail Penilaian</h3>
          <button class="btn-icon" onclick="closeModal()"><span class="material-symbols-rounded">close</span></button>
        </div>
        <div class="modal-body">
          <div class="kvlist">
            <div class="k">Kode Permintaan</div><div class="v"><span class="code-pill">${escapeHtml(x.kode)}</span></div>
            <div class="k">Kategori</div><div class="v">${escapeHtml(x.kategori)}</div>
            <div class="k">Pemesan</div><div class="v">${escapeHtml(x.pemesan)}</div>
            <div class="k">Vendor</div><div class="v">${escapeHtml(x.vendor||'—')}</div>
            <div class="k">PIC GA</div><div class="v">${escapeHtml(x.pic_ga||'—')}</div>
            <div class="k">Status</div><div class="v">${x.status_nilai}</div>
            ${x._rating ? `
              <div class="k">Rating</div><div class="v" style="font-size:18px;color:#FBBF24">${'★'.repeat(x._rating.rating)}${'☆'.repeat(5-x._rating.rating)} <span class="muted" style="font-size:13px;color:var(--text-mut)">(${x._rating.rating}/5)</span></div>
              <div class="k">Kritik / Saran</div><div class="v">${escapeHtml(x._rating.kritik_saran||'—')}</div>
              <div class="k">Tanggal Penilaian</div><div class="v">${fmtDateTime(x._rating.created_at)}</div>
            `:'<div class="k">Catatan</div><div class="v muted">Pemohon belum mengisi penilaian.</div>'}
          </div>
        </div>
        <div class="modal-foot">
          ${!x._rating ? `<button class="btn btn-ghost" id="copy-rl"><span class="material-symbols-rounded">link</span>Salin Tautan Penilaian</button>`:''}
          <button class="btn btn-primary" onclick="closeModal()">Tutup</button>
        </div>
      `, 'lg');
      const copyBtn = $('#copy-rl'); if(copyBtn){
        copyBtn.addEventListener('click', (e)=> copyText(location.origin + location.pathname + '#/rate/' + x.id, e.currentTarget));
      }
    }));
  }
  render();

  $('#rate-search').addEventListener('input', e => { _ratingsState.search = e.target.value.toLowerCase(); _ratingsState.page = 1; render(); });
  $('#csv-rate').addEventListener('click', () => {
    const csvRows = rows.map(x => ({
      Kode: x.kode, Kategori: x.kategori, Pemesan: x.pemesan,
      Vendor: x.vendor, PIC_GA: x.pic_ga,
      Status_Penilaian: x.status_nilai,
      Rating: x.rating||'', Kritik_Saran: x.kritik||'',
      Tanggal: x.created_at
    }));
    csvDownload('daftar-penilaian-'+new Date().toISOString().slice(0,10)+'.csv', csvRows);
  });
}

          <div class="flex gap-2 mb-3">
            <input class="input" id="new-tuj" placeholder="Tambah tujuan baru..." style="flex:1"/>
            <button class="btn btn-primary" id="add-tuj" title="Tambah"><span class="material-symbols-rounded">add</span></button>
          </div>
          <div id="list-tuj"></div>
        </div>
      </div>
    </div>

    <div style="margin-top:14px">
      <div class="card">
        <div class="card-head"><h3>Mata Anggaran</h3></div>
        <div class="card-body">
          <p class="muted text-sm" style="margin:0 0 10px">Daftar mata anggaran (budget line items) untuk klasifikasi pengeluaran. Hanya tampil di menu Edit Permintaan.</p>
          <div class="form-grid" style="gap:6px;margin-bottom:8px;grid-template-columns:1fr 1fr auto">
            <input class="input" id="new-ma-name" placeholder="Nama (mis. Operasional Harian)"/>
            <input class="input" id="new-ma-kode" placeholder="Kode (opsional)"/>
            <button class="btn btn-primary" id="add-ma"><span class="material-symbols-rounded">add</span>Tambah</button>
          </div>
          <div id="list-ma"></div>
        </div>
      </div>
    </div>
  `;

  async function refresh(){
    const [lok, lokker, tuj, ma] = await Promise.all([
      db.listLokasi(), db.listLokasiKerja(), db.listTujuan(), db.listMataAnggaran()
    ]);
    const renderList = (items, target, kind) => {
      $(target).innerHTML = items.length ? items.map(o=>`
        <div class="flex between items-center" style="padding:10px 0;border-bottom:1px solid var(--border-2)">
          <span>${escapeHtml(o.name)}</span>
          <button class="btn-icon" data-id="${o.id}" data-kind="${kind}" title="Hapus"><span class="material-symbols-rounded">delete</span></button>
        </div>
      `).join('') : '<div class="muted text-sm">Belum ada data</div>';
      $$('button[data-id]', $(target)).forEach(b => b.addEventListener('click', async () => {
        if(!confirm('Hapus item ini?')) return;
        try{
          const kind = b.dataset.kind; const id = b.dataset.id;
          const itemName = items.find(x => x.id === id)?.name;
          if(kind==='lok')         await db.deleteLokasi(id);
          else if(kind==='lokker') await db.deleteLokasiKerja(id);
          else                     await db.deleteTujuan(id);
          db.logActivity({ action:'masterdata.delete', target_type:kind, target_id:id, detail:`Hapus ${kind}: ${itemName||id}` });
          toast('Item dihapus','success'); refresh();
        }catch(err){ toast('Gagal menghapus','error'); }
      }));
    };
    renderList(lok,    '#list-lok',    'lok');
    renderList(lokker, '#list-lokker', 'lokker');
    renderList(tuj,    '#list-tuj',    'tuj');

    // Mata Anggaran
    $('#list-ma').innerHTML = ma.length ? `
      <div class="table-wrap"><table class="t"><thead><tr>
        <th>Nama</th><th style="width:140px">Kode</th><th style="width:60px;text-align:right">Aksi</th>
      </tr></thead><tbody>
      ${ma.map(o => `
        <tr>
          <td><strong>${escapeHtml(o.name)}</strong>${o.description?`<div class="text-sm muted">${escapeHtml(o.description)}</div>`:''}</td>
          <td>${o.kode ? `<span class="tag">${escapeHtml(o.kode)}</span>` : '—'}</td>
          <td style="text-align:right"><button class="btn-icon" data-ma-del="${o.id}" title="Hapus"><span class="material-symbols-rounded">delete</span></button></td>
        </tr>
      `).join('')}
      </tbody></table></div>` : '<div class="muted text-sm">Belum ada data</div>';
    $$('button[data-ma-del]').forEach(b => b.addEventListener('click', async () => {
      if(!confirm('Hapus mata anggaran ini?')) return;
      const id = b.dataset.maDel; const item = ma.find(x => x.id === id);
      try{
        await db.deleteMataAnggaran(id);
        db.logActivity({ action:'masterdata.delete', target_type:'mata_anggaran', target_id:id, detail:`Hapus mata anggaran: ${item?.name||id}` });
        toast('Dihapus','success'); refresh();
      }catch(err){ toast('Gagal menghapus','error'); }
    }));
  }
  await refresh();

  $('#md-backup').addEventListener('click', () => downloadBackupXlsx());
  $('#add-lok').addEventListener('click', async () => {
    const v = $('#new-lok').value.trim(); if(!v) return;
    try{
      await db.addLokasi(v);
      db.logActivity({ action:'masterdata.create', target_type:'lok', detail:'Tambah lokasi kebutuhan: '+v });
      $('#new-lok').value=''; toast('Lokasi ditambahkan','success'); refresh();
    }catch(err){ toast('Gagal menambah: '+(err.message||''),'error'); }
  });
  $('#add-lokker').addEventListener('click', async () => {
    const v = $('#new-lokker').value.trim(); if(!v) return;
    try{
      await db.addLokasiKerja(v);
      db.logActivity({ action:'masterdata.create', target_type:'lokker', detail:'Tambah lokasi kerja: '+v });
      $('#new-lokker').value=''; toast('Lokasi kerja ditambahkan','success'); refresh();
    }catch(err){ toast('Gagal menambah: '+(err.message||''),'error'); }
  });
  $('#add-tuj').addEventListener('click', async () => {
    const v = $('#new-tuj').value.trim(); if(!v) return;
    try{
      await db.addTujuan(v);
      db.logActivity({ action:'masterdata.create', target_type:'tuj', detail:'Tambah tujuan kebutuhan: '+v });
      $('#new-tuj').value=''; toast('Tujuan ditambahkan','success'); refresh();
    }catch(err){ toast('Gagal menambah: '+(err.message||''),'error'); }
  });
  $('#add-ma').addEventListener('click', async () => {
    const name = $('#new-ma-name').value.trim();
    const kode = $('#new-ma-kode').value.trim();
    if(!name){ toast('Nama mata anggaran wajib diisi','warn'); return; }
    try{
      await db.addMataAnggaran({ name, kode:kode||null });
      db.logActivity({ action:'masterdata.create', target_type:'mata_anggaran', detail:`Tambah mata anggaran: ${name}${kode?' ('+kode+')':''}` });
      $('#new-ma-name').value=''; $('#new-ma-kode').value='';
      toast('Mata anggaran ditambahkan','success'); refresh();
    }catch(err){ toast('Gagal menambah: '+(err.message||''),'error'); }
  });
}

/* ============================================================
   v1.7: KATEGORI PEMESANAN — dedicated page
   ============================================================ */
async function viewAdminKategori(c){
  c.innerHTML = `
    <div class="card">
      <div class="card-head">
        <h3>Kategori Pemesanan</h3>
        <button class="btn btn-primary btn-sm" id="add-kat-btn"><span class="material-symbols-rounded">add</span>Tambah Kategori</button>
      </div>
      <div class="card-body">
        <div class="callout" style="background:var(--mrt-blue-soft);padding:12px 14px;border-radius:8px;border-left:3px solid var(--mrt-blue);margin-bottom:14px">
          <strong>Cara kerja Kategori:</strong>
          Setiap kategori punya <strong>Nama</strong>, <strong>Kode prefix</strong> (mis. <code>FB</code>, <code>VEH</code>), dan <strong>SLA default</strong> dalam jam.
          Kode prefix akan dipakai di kode permintaan (<code>FB-200520260001</code>). SLA dapat di-edit lebih lanjut di menu <strong>SLA Target</strong>.
          Kategori non-aktif tidak muncul di form publik, tapi tiket lama tetap tersimpan utuh.
        </div>
        <div id="kat-table-host"></div>
      </div>
    </div>
  `;
  $('#add-kat-btn').addEventListener('click', () => openKategoriAddModal(renderKat));

  async function renderKat(){
    const items = await db.listKategori();
    const host = $('#kat-table-host');
    if(!items.length){ host.innerHTML = '<div class="muted">Belum ada kategori. Klik "Tambah Kategori" di kanan atas.</div>'; return; }
    host.innerHTML = `
      <div class="table-wrap"><table class="t">
        <thead><tr>
          <th style="width:44px">#</th>
          <th>Nama Kategori</th>
          <th style="width:100px">Kode</th>
          <th style="width:140px">SLA Default</th>
          <th>Deskripsi</th>
          <th style="width:100px">Status</th>
          <th style="width:120px;text-align:right">Aksi</th>
        </tr></thead>
        <tbody>
          ${items.map((k,i) => `
            <tr>
              <td>${i+1}</td>
              <td><strong>${escapeHtml(k.name)}</strong></td>
              <td><span class="tag">${escapeHtml(k.kode)}</span></td>
              <td><strong style="color:var(--mrt-blue)">${k.default_sla_hours} jam</strong> <span class="text-sm muted">(${fmtDurationHours(k.default_sla_hours)})</span></td>
              <td><span class="text-sm">${escapeHtml(k.description||'—')}</span></td>
              <td>${k.active
                ? '<span class="badge status-selesai">Aktif</span>'
                : '<span class="badge gray">Non-aktif</span>'}</td>
              <td style="text-align:right;white-space:nowrap">
                <button class="btn-icon" data-toggle="${k.id}" title="${k.active?'Nonaktifkan':'Aktifkan'}"><span class="material-symbols-rounded">${k.active?'visibility_off':'visibility'}</span></button>
                <button class="btn-icon" data-del="${k.id}" title="Hapus"><span class="material-symbols-rounded">delete</span></button>
              </td>
            </tr>
          `).join('')}
        </tbody></table></div>
    `;
    $$('button[data-toggle]', host).forEach(b => b.addEventListener('click', async () => {
      const id = b.dataset.toggle; const k = items.find(x => x.id === id);
      try{
        await db.updateKategoriActive(id, !k.active);
        db.logActivity({ action:'kategori.toggle', target_type:'kategori', target_id:id, detail:`Set ${k.name} → ${!k.active?'Aktif':'Non-aktif'}` });
        await refreshKategoriKode();
        toast('Status diubah','success'); renderKat();
      }catch(err){ toast('Gagal: '+(err.message||''),'error'); }
    }));
    $$('button[data-del]', host).forEach(b => b.addEventListener('click', async () => {
      const id = b.dataset.del; const k = items.find(x => x.id === id);
      if(!confirm(`Hapus kategori "${k.name}" beserta SLA target-nya?\n\nTiket lama dengan kategori ini akan tetap ada tetapi tidak dapat dibuat permintaan baru.`)) return;
      try{
        await db.deleteKategori(id);
        db.logActivity({ action:'kategori.delete', target_type:'kategori', target_id:id, detail:`Hapus kategori: ${k.name} (${k.kode})` });
        await refreshKategoriKode();
        toast('Kategori dihapus','success'); renderKat();
      }catch(err){ toast('Gagal: '+(err.message||''),'error'); }
    }));
  }
  renderKat();
}

function openKategoriAddModal(onDone){
  openModal(`
    <div class="modal-head">
      <h3><span class="material-symbols-rounded" style="vertical-align:-6px;color:var(--mrt-blue)">category</span> Tambah Kategori</h3>
      <button class="btn-icon" onclick="closeModal()"><span class="material-symbols-rounded">close</span></button>
    </div>
    <div class="modal-body">
      <form id="kat-add-form">
        <div class="field field-required">
          <label>Nama Kategori</label>
          <input class="input" name="name" required placeholder="Mis. Vehicle Request"/>
          <span class="hint">Nama lengkap kategori, akan ditampilkan di form publik.</span>
        </div>
        <div class="form-grid">
          <div class="field field-required">
            <label>Kode Prefix</label>
            <input class="input" name="kode" required maxlength="6" pattern="[A-Za-z0-9-]+" placeholder="Mis. VEH" style="text-transform:uppercase"/>
            <span class="hint">2-6 huruf/angka. Akan dipakai sebagai prefix kode permintaan: <code>VEH-DDMMYYYY####</code>.</span>
          </div>
          <div class="field field-required">
            <label>SLA Default (jam)</label>
            <input class="input" name="default_sla_hours" required type="number" min="1" max="9999" placeholder="24"/>
            <span class="hint">Mis. <strong>4</strong> = 4 jam, <strong>24</strong> = 1 hari, <strong>168</strong> = 1 minggu.</span>
          </div>
          <div class="field full">
            <label>Deskripsi (opsional)</label>
            <textarea class="textarea" name="description" placeholder="Penjelasan kategori atau aturan khusus."></textarea>
          </div>
        </div>
      </form>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Batal</button>
      <button class="btn btn-primary" id="kat-save"><span class="material-symbols-rounded">save</span>Simpan</button>
    </div>
  `, 'md');

  $('#kat-save').addEventListener('click', async () => {
    const fd = new FormData($('#kat-add-form'));
    const name = (fd.get('name')||'').trim();
    const kode = (fd.get('kode')||'').trim().toUpperCase();
    const hours = Number(fd.get('default_sla_hours'));
    const desc = (fd.get('description')||'').trim() || null;
    if(!name || !kode || !hours){ toast('Lengkapi field yang wajib','warn'); return; }
    if(!/^[A-Z0-9-]{2,6}$/.test(kode)){ toast('Kode harus 2-6 huruf/angka/dash','warn'); return; }
    try{
      const row = await db.addKategori({ name, kode, default_sla_hours:hours, description:desc });
      db.logActivity({ action:'kategori.create', target_type:'kategori', target_id:row.id, detail:`Tambah kategori: ${name} (${kode}) · SLA ${hours} jam` });
      await refreshKategoriKode();
      closeModal();
      toast('Kategori ditambahkan','success');
      onDone && onDone();
    }catch(err){ toast('Gagal: '+(err.message||''),'error'); }
  });
}

    $('#div-new-save').addEventListener('click', async () => {
      const v = $('#div-new-name').value.trim();
      if(!v){ toast('Nama wajib','warn'); return; }
      try{

  async function refresh(){
    const [divs, deps, users] = await Promise.all([db.listDivisi(), db.listDepartemen(), db.listUsers()]);

    // Populate Divisi filter
    const selDiv = $('#dep-filter-div');
    const prevVal = selDiv.value;
    selDiv.innerHTML = '<option value="">Semua Divisi</option>' +
      divs.map(d => `<option value="${escapeHtml(d.id)}" ${d.id===prevVal?'selected':''}>${escapeHtml(d.name)}</option>`).join('');

    const filterDivId = selDiv.value;
    const q = ($('#dep-search').value || '').toLowerCase();
    let filtered = deps;
    if(filterDivId) filtered = filtered.filter(d => d.divisi_id === filterDivId);
    if(q) filtered = filtered.filter(d => d.name.toLowerCase().includes(q));

    const host = $('#dep-list-host');
    if(!filtered.length){ host.innerHTML = '<div class="muted">Tidak ada departemen sesuai filter.</div>'; return; }

    host.innerHTML = `
      <div class="table-wrap"><table class="t">
        <thead><tr>
          <th style="width:44px">#</th>
          <th>Nama Departemen</th>
          <th>Divisi</th>
          <th>Kepala Departemen</th>
          <th style="width:80px;text-align:right">Aksi</th>
        </tr></thead>
        <tbody>

          const dv = divs.find(x => x.id === d.divisi_id);
          const kep = d.kepala_departemen_user_id ? users.find(u => u.id === d.kepala_departemen_user_id) : null;
          return `<tr>
            <td>${i+1}</td>

              ? `<strong>${escapeHtml(kep.full_name)}</strong> <span class="text-sm muted">· ${escapeHtml(kep.jabatan||kep.role)}</span>`
              : '<span class="muted text-sm">— belum ditunjuk —</span>'}</td>

      const id = b.dataset.setKep;
      const dep = deps.find(d => d.id === id);
      openModal(`

          <h3><span class="material-symbols-rounded" style="vertical-align:-6px;color:var(--mrt-blue)">person_add</span> Atur Kepala Departemen</h3>

        </div>

        const newId = $('#kep-user').value || null;
        try{
          await db.updateDepartemenKepala(id, newId);

function openApprovalDecideModal(approvalId, decision, onDone){
  const isApprove = decision === 'approved';
  openModal(`
    <div class="modal-head">
      <h3>
        <span class="material-symbols-rounded" style="vertical-align:-6px;color:${isApprove?'var(--mrt-green)':'var(--danger)'}">${isApprove?'check_circle':'cancel'}</span>
        ${isApprove?'Setujui Permintaan':'Tolak Permintaan'}
      </h3>
      <button class="btn-icon" onclick="closeModal()"><span class="material-symbols-rounded">close</span></button>
    </div>
    <div class="modal-body">
      <div class="field"><label>Catatan ${isApprove?'(opsional)':'(wajib)'}</label>
        <textarea class="textarea" id="apr-reason" placeholder="${isApprove?'Mis. anggaran tersedia, vendor sudah dikonfirmasi.':'Mis. anggaran belum tersedia di kuartal ini.'}"></textarea>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Batal</button>
      <button class="btn ${isApprove?'btn-primary':''}" id="apr-save" style="${isApprove?'':'background:var(--danger);color:#fff'}">
        <span class="material-symbols-rounded">${isApprove?'check':'close'}</span>${isApprove?'Setujui':'Tolak'}
      </button>
    </div>
  `, 'sm');
  $('#apr-save').addEventListener('click', async () => {
    const reason = $('#apr-reason').value.trim();
    if(!isApprove && !reason){ toast('Alasan wajib diisi untuk penolakan','warn'); return; }
    try{
      const updated = await db.decideApproval(approvalId, decision, reason);
      db.logActivity({
        action: 'approval.'+decision,
        target_type:'approval', target_id:approvalId,
        detail:`Approval di-${isApprove?'setujui':'tolak'}${reason?': '+reason:''}`,
        meta:{ approval_id:approvalId, decision }
      });
      // If approved, also notify the original requester via a notification
      if(isApprove && updated){
        try{
          const cur = session.get();
          if(typeof supa !== 'undefined' && SUPA_CONFIGURED){
            await supa.from('notifications').insert({
              user_id: updated.requested_by, request_id: updated.request_id,
              type:'approval_granted',
              title:'Permintaan disetujui',
              body:'Approval Kepala Departemen telah diberikan. Anda dapat melanjutkan ke Sedang Disiapkan.'
            });
          }else{
            demo.notifications.unshift({
              id:'n'+(demo.notifications.length+1), user_id: updated.requested_by, request_id: updated.request_id,
              type:'approval_granted',
              title:'Permintaan disetujui',
              body:`Approval Kepala Departemen telah diberikan. Anda dapat melanjutkan ke Sedang Disiapkan.`,
              read_at:null, created_at:new Date().toISOString()
            });
          }
        }catch{}
      }
      closeModal();
      toast(isApprove?'Disetujui':'Ditolak','success');
      onDone && onDone();
      // Refresh sidebar badge
      refreshApprovalBadge(session.get());
    }catch(err){ toast('Gagal: '+(err.message||''),'error'); }
  });
}

          role: fd.get('role'),
          jabatan: fd.get('jabatan') || null,
          lokasi_kerja: fd.get('lokasi_kerja') || null,

        });

    </div>
  `, 'sm');
  $('#pw-save').addEventListener('click', async () => {
    const a = $('#pw-new').value; const b = $('#pw-conf').value;
    if(!a || a.length<4){ toast('Password minimal 4 karakter','warn'); return; }
    if(a!==b){ toast('Password tidak cocok','warn'); return; }
    try{
      let ok = false;
      if(SUPA_CONFIGURED){
        try{
          const { error } = await supa.rpc('fn_set_password', { p_user_id: user.id, p_password: a });

        }catch(_){}
      }
      if(!ok) await db.updateUser(user.id, { password_hash: a });
      closeModal(); toast('Password diubah','success');
    }catch(err){ toast('Gagal mengubah password','error'); }
  });

  $('input[name="target_hours"]').addEventListener('input', e => {
    const v = Number(e.target.value || 0);
    $('#sla-preview').value = fmtDurationHours(v);
  });

  $('#sla-save').addEventListener('click', async () => {
    const fd = new FormData($('#sla-form'));
    const newHours = Number(fd.get('target_hours'));
    const newDesc  = (fd.get('description') || '').trim() || null;
    if(!newHours || newHours < 1){ toast('Target jam harus lebih dari 0','warn'); return; }
    try{
      await db.updateSlaTarget(t.id, {
        target_hours: newHours,
        description: newDesc
      });
      db.logActivity({
        action:'sla.update', target_type:'sla', target_id:t.id,
        detail:`SLA ${t.kategori_kode}: ${t.target_hours}j → ${newHours}j` + (newDesc !== t.description ? ' · deskripsi diperbarui' : ''),
        meta:{ from_hours:t.target_hours, to_hours:newHours }
      });
      _slaTargetsCache = null;   // invalidate cache so all pages re-fetch
      closeModal();
      toast('SLA target diperbarui','success');
      onDone && onDone();
    }catch(err){ console.error(err); toast('Gagal menyimpan: '+(err.message||''),'error'); }
  });
}

async function viewAdminMyTicket(c){
  const me = session.get();
  const [allReqs, allUsers] = await Promise.all([db.listRequests(), db.listUsers()]);
  const isLead = me.role === 'superadmin' || me.role === 'admin';

  c.innerHTML = `
    <div class="profile-card">
      <div class="av-lg">${escapeHtml((me.full_name||'A').slice(0,1).toUpperCase())}</div>
      <div style="flex:1">
        <h3>${escapeHtml(me.full_name)}</h3>
        <div class="meta">
          <span><span class="material-symbols-rounded" style="font-size:16px">badge</span>${escapeHtml(me.jabatan||me.role)}</span>
          <span><span class="material-symbols-rounded" style="font-size:16px">place</span>${escapeHtml(me.lokasi_kerja||'—')}</span>
          <span><span class="material-symbols-rounded" style="font-size:16px">account_circle</span>${escapeHtml(me.username||'')}</span>
        </div>
      </div>
      ${isLead?`
        <div>
          <select class="select" id="mt-view-mode" style="background:#fff;color:var(--text);border:1px solid rgba(255,255,255,.4);font-weight:600;min-width:170px">
            <option value="me">Tiket Saya</option>
            <option value="team">Tampilan Tim</option>
          </select>
        </div>`:''}
    </div>
    <div id="mt-content"></div>
  `;

  function render(mode){
    const host = $('#mt-content');
    if(mode === 'team'){
      // group pending tickets by PIC name; include "Belum Ditugaskan"
      const pending = allReqs.filter(r => ['Belum Dikonfirmasi','Mencari Penyedia','Sedang Disiapkan','Tersedia'].includes(r.status));
      const buckets = {};
      const order = [];
      // Pre-create buckets for all active staff so empty ones show
      allUsers.filter(u => u.active !== false).forEach(u => {
        buckets[u.full_name] = { user: u, items: [] };
        order.push(u.full_name);
      });
      buckets['(Belum Ditugaskan)'] = { user: null, items: [] };
      order.push('(Belum Ditugaskan)');
      pending.forEach(r => {
        const key = r.nama_pic_ga || '(Belum Ditugaskan)';
        if(!buckets[key]){ buckets[key] = { user:null, items:[] }; order.push(key); }
        buckets[key].items.push(r);
      });
      host.innerHTML = order.map(k => renderBucket(k, buckets[k].user, buckets[k].items, true)).join('')
        || '<div class="muted">Tidak ada tiket pending.</div>';
    } else {
      // mode = 'me' — group MY pending tickets by status
      const mine = allReqs.filter(r => r.pic_user_id === me.id
        && ['Belum Dikonfirmasi','Mencari Penyedia','Sedang Disiapkan','Tersedia'].includes(r.status));
      const statuses = ['Belum Dikonfirmasi','Mencari Penyedia','Sedang Disiapkan','Tersedia'];
      host.innerHTML = statuses.map(s => {
        const items = mine.filter(r => r.status === s);
        return renderBucket(s, null, items, false);
      }).join('');
      if(!mine.length){
        host.innerHTML += '<div class="card card-pad center muted" style="margin-top:8px">🎉 Tidak ada tiket pending untuk Anda saat ini.</div>';
      }
    }
    // Wire up edit/view buttons inside the buckets
    $$('button[data-mt-act]', host).forEach(b => b.addEventListener('click', () => {
      const id = b.dataset.id; const act = b.dataset.mtAct;
      if(act==='view') openRequestDetail(id);
      else if(act==='edit') openRequestEdit(id);
    }));
  }

  function renderBucket(title, user, items, showPicHeader){
    const sub = user ? `<span style="color:var(--text-mut);font-size:12px;font-weight:500"> · ${escapeHtml(user.jabatan||user.role)} · ${escapeHtml(user.lokasi_kerja||'—')}</span>` : '';
    return `
      <div class="card bucket-card">
        <div class="bucket-head">
          <h3>${showPicHeader?'<span class="material-symbols-rounded" style="font-size:18px;color:var(--mrt-blue)">person</span>':'<span class="material-symbols-rounded" style="font-size:18px;color:var(--mrt-blue)">label</span>'} ${escapeHtml(title)}${sub}</h3>
          <span class="bucket-count">${items.length}</span>
        </div>
        ${items.length ? `
          <div class="table-wrap" style="border-radius:0">
            <table class="t">
              <thead><tr>
                <th>Kode</th><th>Kategori</th><th>Pemesan</th>
                ${showPicHeader?'<th>Status</th>':''}
                <th>Tgl Kebutuhan</th><th>Detail</th>
                <th style="text-align:right">Aksi</th>
              </tr></thead>
              <tbody>
                ${items.map(r => `
                  <tr>
                    <td><span class="code-pill">${escapeHtml(r.kode_permintaan)}</span></td>
                    <td><span class="tag">${escapeHtml(r.kategori_kode||'')}</span></td>
                    <td>${escapeHtml(r.nama_pemesan)}</td>
                    ${showPicHeader?`<td><span class="badge ${STATUS_CLASS[r.status]||''}">${escapeHtml(r.status)}</span></td>`:''}
                    <td>${fmtDate(r.tanggal_kebutuhan)}</td>
                    <td style="max-width:260px"><div style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${escapeHtml(r.detail_kebutuhan||'')}">${escapeHtml(r.detail_kebutuhan||'')}</div></td>
                    <td style="text-align:right;white-space:nowrap">
                      <div class="actions-compact">
                        <button class="btn-icon" data-id="${r.id}" data-mt-act="view" title="Detail"><span class="material-symbols-rounded">visibility</span></button>
                        <button class="btn-icon" data-id="${r.id}" data-mt-act="edit" title="Update"><span class="material-symbols-rounded">edit</span></button>
                      </div>
                    </td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>` : '<div class="card-body muted text-sm">Tidak ada tiket pada kategori ini.</div>'}
      </div>
    `;
  }

  // initial render in "me" mode
  render('me');
  // mode switcher for leads
  const modeSel = $('#mt-view-mode');
  if(modeSel) modeSel.addEventListener('change', e => render(e.target.value));
}

/* ----------- MASS UPLOAD CSV MODAL -----------
   Flow: pick file → parse & validate → preview → submit. */
function openMassUploadModal(){
  // CSV column spec
  const COLS = [
    {key:'kategori',         label:'Kategori',         required:true,  type:'enum', values:Object.keys(KATEGORI_KODE)},
    {key:'kode_smartoffice', label:'Kode SmartOffice', required:false},
    {key:'sumber_pemesanan', label:'Sumber Pemesanan', required:true,  type:'enum', values:['WhatsApp','SmartOffice','Walk-in','Email']},
    {key:'nama_pemesan',     label:'Nama Pemesan',     required:true},
    {key:'nama_kegiatan',    label:'Nama Kegiatan',    required:false},
    {key:'lokasi_kebutuhan', label:'Lokasi Kebutuhan', required:false},
    {key:'tujuan_kebutuhan', label:'Tujuan Kebutuhan', required:false},
    {key:'tanggal_kebutuhan',label:'Tanggal Kebutuhan',required:true,  type:'date'},
    {key:'detail_kebutuhan', label:'Detail Kebutuhan', required:true},
    {key:'estimasi_harga',   label:'Estimasi Harga',   required:false, type:'number'}
  ];

  const renderModal = (step) => {
    const stepper = `
      <div class="stepper">
        <div class="stp ${step>=1?(step===1?'active':'done'):''}"><span class="num">1</span>Upload</div>
        <div class="stp ${step>=2?(step===2?'active':'done'):''}"><span class="num">2</span>Periksa & Preview</div>
        <div class="stp ${step>=3?(step===3?'active':'done'):''}"><span class="num">3</span>Submit</div>
      </div>`;
    let body = '';
    if(step === 1){
      body = `
        ${stepper}
        <p class="muted text-sm" style="margin:0 0 14px">Unggah file CSV berisi daftar permintaan. Sistem akan memvalidasi setiap baris sebelum disimpan.</p>
        <div class="drop-zone" id="mu-drop" tabindex="0">
          <span class="material-symbols-rounded">cloud_upload</span>
          <div class="fw-700">Klik atau seret file CSV ke sini</div>
          <div class="muted text-sm">Maksimal 500 baris per file</div>
          <input type="file" id="mu-file" accept=".csv,text/csv" style="display:none" />
        </div>
        <div class="card card-pad mt-4" style="background:var(--surface-2);border-radius:12px">
          <div class="flex between items-center" style="margin-bottom:10px">
            <strong style="font-size:14px"><span class="material-symbols-rounded" style="font-size:18px;vertical-align:-3px;color:var(--mrt-blue)">info</span> Tutorial Singkat</strong>
            <button type="button" class="btn btn-accent btn-sm" id="mu-template"><span class="material-symbols-rounded" style="font-size:18px">download</span>Download Template</button>
          </div>
          <ol style="margin:0;padding-left:18px;font-size:13px;color:var(--text-2);line-height:1.7">
            <li>Klik <em>Download Template</em> di kanan, isi sesuai contoh.</li>
            <li>Kolom <strong>wajib</strong>: ${COLS.filter(c=>c.required).map(c=>c.label).join(', ')}.</li>
            <li><strong>Kategori</strong> harus sama persis dengan salah satu: <em>Food and Beverage, Direct Purchase, Fasilitas Kantor dan Identitas Karyawan, Seragam, Office Supply, Event Support</em>.</li>
            <li><strong>Tanggal Kebutuhan</strong> format <code>YYYY-MM-DD</code> (mis. <code>2026-05-20</code>).</li>
            <li><strong>Estimasi Harga</strong> berupa angka tanpa titik/koma (mis. <code>1500000</code>).</li>
            <li>Kode permintaan akan <strong>otomatis</strong> dibuat berdasarkan kategori; jangan diisi.</li>
            <li>Encoding CSV sebaiknya <strong>UTF-8</strong>.</li>
          </ol>
        </div>
      `;
    } else if(step === 2){
      body = `
        ${stepper}
        <div id="mu-preview-host"></div>
      `;
    } else if(step === 3){
      body = `
        ${stepper}
        <div class="center" id="mu-progress">
          <div class="success-mark" style="background:var(--mrt-blue-soft);color:var(--mrt-blue)"><span class="material-symbols-rounded" style="animation:spin 1s linear infinite">progress_activity</span></div>
          <h3 style="margin:0 0 6px">Menyimpan permintaan...</h3>
          <p class="muted" id="mu-progress-msg">Mohon tunggu</p>
        </div>
      `;
    }
    return `
      <div class="modal-head">
        <h3><span class="material-symbols-rounded" style="vertical-align:-6px;color:var(--mrt-blue)">upload_file</span> Mass Upload Permintaan</h3>
        <button class="btn-icon" onclick="closeModal()"><span class="material-symbols-rounded">close</span></button>
      </div>
      <div class="modal-body">${body}</div>
      <div class="modal-foot" id="mu-foot"></div>
    `;
  };

  // state
  let parsedRows = [];     // {row, errors[]}
  let validRows = [];

  function setStep(step){
    $('#modal-content .modal').innerHTML = renderModal(step);
    if(step === 1){
      // wire up uploader
      const dz = $('#mu-drop'); const fi = $('#mu-file');
      dz.addEventListener('click', () => fi.click());
      dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag'); });
      dz.addEventListener('dragleave', () => dz.classList.remove('drag'));
      dz.addEventListener('drop', e => {
        e.preventDefault(); dz.classList.remove('drag');
        if(e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
      });
      fi.addEventListener('change', () => { if(fi.files.length) handleFile(fi.files[0]); });
      $('#mu-template').addEventListener('click', downloadTemplate);
      $('#mu-foot').innerHTML = `<button class="btn btn-ghost" onclick="closeModal()">Batal</button>`;
    } else if(step === 2){
      renderPreview();
      $('#mu-foot').innerHTML = `
        <button class="btn btn-ghost" id="mu-back">Kembali</button>
        <button class="btn btn-primary" id="mu-confirm" ${validRows.length===0?'disabled':''}>
          <span class="material-symbols-rounded">cloud_upload</span>Submit ${validRows.length} permintaan
        </button>
      `;
      $('#mu-back').addEventListener('click', () => setStep(1));
      $('#mu-confirm').addEventListener('click', () => doSubmit());
    } else if(step === 3){
      $('#mu-foot').innerHTML = '';
    }
  }

  // CSV parser — supports quoted fields & escaped quotes
  function parseCSV(text){
    text = text.replace(/^\uFEFF/, '').replace(/\r\n?/g, '\n');
    const rows = []; let cur = []; let field = ''; let inQ = false;
    for(let i=0; i<text.length; i++){
      const ch = text[i];
      if(inQ){
        if(ch === '"' && text[i+1] === '"'){ field += '"'; i++; }
        else if(ch === '"'){ inQ = false; }
        else field += ch;
      } else {
        if(ch === '"'){ inQ = true; }
        else if(ch === ','){ cur.push(field); field = ''; }
        else if(ch === '\n'){ cur.push(field); rows.push(cur); cur = []; field = ''; }
        else field += ch;
      }
    }
    if(field.length || cur.length){ cur.push(field); rows.push(cur); }
    // drop trailing empty rows
    while(rows.length && rows[rows.length-1].every(c => !c || !c.trim())) rows.pop();
    return rows;
  }

  function handleFile(file){
    if(!file.name.toLowerCase().endsWith('.csv')){ toast('File harus berformat .csv','warn'); return; }
    if(file.size > 2*1024*1024){ toast('File terlalu besar (maks 2 MB)','warn'); return; }
    const reader = new FileReader();
    reader.onload = () => {
      try{
        const rows = parseCSV(reader.result);
        if(rows.length < 2){ toast('CSV kosong atau tanpa header','warn'); return; }
        const header = rows[0].map(h => h.trim());
        // Validate header presence
        const missingCols = COLS.filter(c => c.required && !header.includes(c.label));
        if(missingCols.length){
          toast('Kolom wajib hilang: ' + missingCols.map(c=>c.label).join(', '), 'error', 6000);
          return;
        }
        if(rows.length > 501){
          toast('Maksimal 500 baris data per upload','warn'); return;
        }
        parsedRows = rows.slice(1).map((arr, idx) => {
          const obj = {}; header.forEach((h, i) => obj[h] = (arr[i]||'').trim());
          return validateRow(obj, idx + 2); // +2 because line 1 is header
        });
        validRows = parsedRows.filter(p => p.errors.length === 0).map(p => p.payload);
        setStep(2);
      }catch(err){
        console.error(err);
        toast('Gagal membaca CSV: '+(err.message||''), 'error');
      }
    };
    reader.readAsText(file, 'UTF-8');
  }

  function validateRow(obj, lineNum){
    const errors = [];
    const get = (label) => (obj[label] || '').trim();
    const kategori = get('Kategori');
    if(!kategori) errors.push('Kategori kosong');
    else if(!KATEGORI_KODE[kategori]) errors.push('Kategori tidak dikenali');

    const sumber = get('Sumber Pemesanan');
    if(!sumber) errors.push('Sumber Pemesanan kosong');

    const nama = get('Nama Pemesan');
    if(!nama) errors.push('Nama Pemesan kosong');

    const tgl = get('Tanggal Kebutuhan');
    if(!tgl) errors.push('Tanggal Kebutuhan kosong');
    else if(!/^\d{4}-\d{2}-\d{2}$/.test(tgl) || isNaN(Date.parse(tgl)))
      errors.push('Tanggal harus format YYYY-MM-DD');

    const detail = get('Detail Kebutuhan');
    if(!detail) errors.push('Detail Kebutuhan kosong');

    const harga = get('Estimasi Harga');
    if(harga && !/^\d+$/.test(harga.replace(/[.,\s]/g,''))) errors.push('Estimasi Harga harus angka');

    const payload = errors.length ? null : {
      kategori,
      kategori_kode: KATEGORI_KODE[kategori],
      kode_smartoffice: get('Kode SmartOffice') || null,
      sumber_pemesanan: sumber,
      nama_pemesan: nama,
      nama_kegiatan: get('Nama Kegiatan') || null,
      lokasi_kebutuhan: get('Lokasi Kebutuhan') || null,
      tujuan_kebutuhan: get('Tujuan Kebutuhan') || null,
      tanggal_kebutuhan: tgl,
      detail_kebutuhan: detail,
      estimasi_harga: harga ? Number(harga.replace(/[.,\s]/g,'')) : 0,
      status: 'Belum Dikonfirmasi'
    };
    return { line: lineNum, raw: obj, errors, payload };
  }

  function renderPreview(){
    const host = $('#mu-preview-host');
    const valid = parsedRows.filter(p => p.errors.length === 0).length;
    const invalid = parsedRows.length - valid;
    host.innerHTML = `
      <div class="flex gap-3 mb-4" style="flex-wrap:wrap">
        <div class="card card-pad" style="flex:1;min-width:140px;background:var(--mrt-green-soft);border:1px solid var(--mrt-green-soft)">
          <div class="muted text-sm">Valid</div>
          <div style="font-size:24px;font-weight:800;color:var(--mrt-green)">${valid}</div>
        </div>
        <div class="card card-pad" style="flex:1;min-width:140px;background:#FEF2F2;border:1px solid #FECACA">
          <div class="muted text-sm">Tidak Valid</div>
          <div style="font-size:24px;font-weight:800;color:var(--danger)">${invalid}</div>
        </div>
        <div class="card card-pad" style="flex:1;min-width:140px;background:var(--mrt-blue-soft);border:1px solid var(--mrt-blue-soft)">
          <div class="muted text-sm">Total Baris</div>
          <div style="font-size:24px;font-weight:800;color:var(--mrt-blue)">${parsedRows.length}</div>
        </div>
      </div>

      <div class="table-wrap" style="max-height:340px;overflow:auto">
        <table class="t">
          <thead><tr>
            <th style="width:46px">Baris</th>
            <th style="width:64px">Status</th>
            <th>Kategori</th><th>Pemesan</th><th>Tgl Kebutuhan</th><th>Detail</th><th>Catatan</th>
          </tr></thead>
          <tbody>
            ${parsedRows.map(p => `
              <tr class="preview-row ${p.errors.length?'invalid':''}">
                <td class="mono">${p.line}</td>
                <td>${p.errors.length
                  ? '<span class="badge status-ditolak">Invalid</span>'
                  : '<span class="badge status-selesai">OK</span>'}</td>
                <td>${escapeHtml(p.raw['Kategori']||'')}</td>
                <td>${escapeHtml(p.raw['Nama Pemesan']||'')}</td>
                <td>${escapeHtml(p.raw['Tanggal Kebutuhan']||'')}</td>
                <td style="max-width:240px"><div style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${escapeHtml(p.raw['Detail Kebutuhan']||'')}">${escapeHtml(p.raw['Detail Kebutuhan']||'')}</div></td>
                <td>${p.errors.length ? `<span class="err">${escapeHtml(p.errors.join(' · '))}</span>` : '<span class="muted text-sm">—</span>'}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
      ${invalid ? `<p class="muted text-sm mt-3">⚠️ ${invalid} baris tidak valid akan diabaikan. Perbaiki file CSV dan upload ulang bila ingin memasukkan semuanya.</p>` : ''}
    `;
  }

  async function doSubmit(){
    setStep(3);
    const msg = $('#mu-progress-msg');
    let inserted = 0; let failed = 0;
    for(let i = 0; i < validRows.length; i++){
      const payload = validRows[i];
      try{
        const kode = await db.generateCode(payload.kategori_kode);
        await db.insertRequest({ ...payload, kode_permintaan: kode });
        inserted++;
      }catch(err){
        console.error(err); failed++;
      }
      if(msg) msg.textContent = `Memproses ${i+1} / ${validRows.length}...`;
    }
    // refresh table
    try{
      _adminReqsCache = await db.listRequests();
      const host = $('#req-table-host'); if(host) renderRequestsTable(host, _adminReqsCache, {compact:false});
    }catch{}

    $('#modal-content .modal-body').innerHTML = `
      <div class="center">
        <div class="success-mark"><span class="material-symbols-rounded">check</span></div>
        <h3 style="margin:0 0 6px">Selesai!</h3>
        <p class="muted">Berhasil menyimpan <strong style="color:var(--mrt-green)">${inserted}</strong> permintaan${failed?` · gagal <strong style="color:var(--danger)">${failed}</strong>`:''}.</p>
      </div>
    `;
    $('#mu-foot').innerHTML = `<button class="btn btn-primary" onclick="closeModal()">Tutup</button>`;
    toast(`Mass upload selesai: ${inserted} berhasil`, 'success');
  }

  function downloadTemplate(){
    const header = COLS.map(c => c.label).join(',');
    const today = new Date();
    today.setDate(today.getDate()+7);
    const exampleDate = today.toISOString().slice(0,10);
    const sample1 = [
      'Food and Beverage','SO-FB-2026-0099','WhatsApp','Ahmad Rifai',
      'Rapat Mingguan','Lantai 5 - Meeting Room A','Rapat Internal',
      exampleDate,'Snack box 15 pax + air mineral','1200000'
    ].map(v => /[",]/.test(v)?`"${v.replace(/"/g,'""')}"`:v).join(',');
    const sample2 = [
      'Office Supply','','SmartOffice','Lina Marlina',
      '','Lantai 10 - Open Space','Operasional Harian',
      exampleDate,'Tinta printer Epson L120, 4 botol warna','450000'
    ].map(v => /[",]/.test(v)?`"${v.replace(/"/g,'""')}"`:v).join(',');
    const csv = '\ufeff' + [header, sample1, sample2].join('\n');
    const blob = new Blob([csv], { type:'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'template-mass-upload-permintaan.csv'; a.click();
    URL.revokeObjectURL(url);
    toast('Template diunduh','success', 1500);
  }

  // open with step 1
  openModal('<div></div>', 'lg');
  setStep(1);
}

/* ============================================================
   PDF TANDA TERIMA — generated when status = "Tersedia"
   ============================================================ */
function generateQRDataURL(text, size){
  size = size || 140;
  if(typeof QRCode === 'undefined'){
    console.warn('QRCode library not loaded; skipping QR');
    return null;
  }
  // qrcodejs renders into a DOM node; use a hidden div to extract canvas
  const wrap = document.createElement('div');
  wrap.style.cssText = 'position:absolute;left:-9999px;top:-9999px';
  document.body.appendChild(wrap);
  try{
    new QRCode(wrap, {
      text: text, width: size, height: size,
      colorDark: '#003D7E', colorLight: '#FFFFFF',
      correctLevel: QRCode.CorrectLevel.M
    });
    const canvas = wrap.querySelector('canvas');
    let dataUrl = null;
    if(canvas){
      dataUrl = canvas.toDataURL('image/png');
    } else {
      // Fallback: qrcodejs may render <img> in some browsers
      const img = wrap.querySelector('img');
      if(img) dataUrl = img.src;
    }
    return dataUrl;
  }finally{
    setTimeout(() => wrap.remove(), 0);
  }
}

function loadImageAsDataURL(url){
  return new Promise((resolve) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      try{
        const canvas = document.createElement('canvas');
        canvas.width = img.naturalWidth; canvas.height = img.naturalHeight;
        canvas.getContext('2d').drawImage(img, 0, 0);
        resolve(canvas.toDataURL('image/png'));
      }catch(_){ resolve(null); }
    };
    img.onerror = () => resolve(null);
    img.src = url;
  });
}

async function downloadTandaTerima(req){
  if(!window.jspdf || !window.jspdf.jsPDF){
    toast('Library PDF belum termuat. Coba lagi sebentar.', 'warn');
    return;
  }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit:'mm', format:'a4' });
  const W = doc.internal.pageSize.getWidth();    // 210
  const H = doc.internal.pageSize.getHeight();   // 297
  const M = 14;                                  // margin

  // ----- Header (logo + title) -----
  const logoData = await loadImageAsDataURL('logo.png');
  if(logoData){
    try{ doc.addImage(logoData, 'PNG', M, M, 22, 22); }catch{}
  } else {
    // Fallback brand mark (gradient-like solid box)
    doc.setFillColor(0, 61, 126);
    doc.roundedRect(M, M, 22, 22, 3, 3, 'F');
    doc.setTextColor(255);
    doc.setFont('helvetica','bold');
    doc.setFontSize(11);
    doc.text('GA', M + 11, M + 13, { align:'center' });
  }

  doc.setTextColor(0, 61, 126);
  doc.setFont('helvetica','bold');
  doc.setFontSize(16);
  doc.text('TANDA TERIMA PERMINTAAN', M + 28, M + 9);
  doc.setTextColor(80);
  doc.setFont('helvetica','normal');
  doc.setFontSize(10);
  doc.text('General Affairs Department · PT MRT Jakarta', M + 28, M + 15);
  doc.text('GA Hotline Portal', M + 28, M + 20);

  // Code pill on the right
  doc.setFillColor(232, 240, 251);
  doc.setDrawColor(232, 240, 251);
  const codeText = req.kode_permintaan || '-';
  doc.setFontSize(11);
  const codeWidth = doc.getTextWidth(codeText) + 10;
  doc.roundedRect(W - M - codeWidth, M + 4, codeWidth, 10, 2, 2, 'F');
  doc.setTextColor(0, 61, 126);
  doc.setFont('helvetica','bold');
  doc.text(codeText, W - M - codeWidth / 2, M + 11, { align:'center' });

  // Divider
  doc.setDrawColor(0, 168, 89);
  doc.setLineWidth(0.8);
  doc.line(M, M + 26, W - M, M + 26);
  doc.setDrawColor(200);
  doc.setLineWidth(0.2);

  // ----- Intro text -----
  let y = M + 34;
  doc.setTextColor(50);
  doc.setFont('helvetica','normal');
  doc.setFontSize(10);
  doc.text('Dokumen ini menjadi bukti bahwa permintaan berikut telah diproses dan tersedia untuk diserahkan.', M, y);
  y += 8;

  // ----- Detail table -----
  doc.setFont('helvetica','bold');
  doc.setFontSize(11);
  doc.setTextColor(0, 61, 126);
  doc.text('DETAIL PERMINTAAN', M, y);
  y += 2;

  const fmtDateID = (d) => {
    if(!d) return '—';
    const dt = new Date(d);
    return dt.toLocaleDateString('id-ID', { day:'2-digit', month:'long', year:'numeric' });
  };

  const rows = [
    ['Kode Permintaan',        req.kode_permintaan || '—'],
    ['Kode SmartOffice',       req.kode_smartoffice || '—'],
    ['Kategori',               req.kategori || '—'],
    ['Sumber Pemesanan',       req.sumber_pemesanan || '—'],
    ['Nama Pemesan',           req.nama_pemesan || '—'],
    ['Nama Kegiatan',          req.nama_kegiatan || '—'],
    ['Lokasi Kebutuhan',       req.lokasi_kebutuhan || '—'],
    ['Tujuan Kebutuhan',       req.tujuan_kebutuhan || '—'],
    ['Tanggal Kebutuhan',      fmtDateID(req.tanggal_kebutuhan)],
    ['Detail Kebutuhan',       req.detail_kebutuhan || '—'],
    ['Estimasi Harga',         req.estimasi_harga ? fmtRupiah(req.estimasi_harga) : '—'],
    ['Total Anggaran',         req.total_anggaran ? fmtRupiah(req.total_anggaran) : '—'],
    ['Nama Vendor',            req.nama_vendor || '—'],
    ['PIC General Affairs',    req.nama_pic_ga || '—'],
    ['Estimasi Penyelesaian',  fmtDateID(req.estimasi_penyelesaian)],
    ['Status',                 req.status || '—']
  ];

  doc.autoTable({
    startY: y + 2,
    margin: { left: M, right: M },
    head: [['Keterangan', 'Nilai']],
    body: rows,
    theme: 'grid',
    styles: { font:'helvetica', fontSize:9.5, cellPadding:2.4, lineColor:[227,232,240], textColor:[30,40,55] },
    headStyles: { fillColor:[0,61,126], textColor:[255,255,255], fontStyle:'bold', halign:'left' },
    columnStyles: { 0:{ cellWidth:60, fontStyle:'bold', textColor:[80,90,110], fillColor:[249,250,252] }, 1:{ cellWidth:'auto' } }
  });

  let afterTableY = doc.lastAutoTable.finalY + 8;

  // ----- QR code (bottom-right of detail block) -----
  const ratingUrl = location.origin + location.pathname + '#/rate/' + req.id;
  const qrData = generateQRDataURL(ratingUrl, 220);

  // If page space tight, add a new page
  const needed = 70; // signature block + qr area
  if(afterTableY + needed > H - 16){
    doc.addPage();
    afterTableY = M;
  }

  const qrSize = 32;
  const qrX = W - M - qrSize;
  const qrY = afterTableY;
  if(qrData){
    try{ doc.addImage(qrData, 'PNG', qrX, qrY, qrSize, qrSize); }catch{}
  }
  // QR caption
  doc.setFont('helvetica','bold');
  doc.setFontSize(8.5);
  doc.setTextColor(0, 61, 126);
  doc.text('PENILAIAN PELAYANAN', qrX + qrSize/2, qrY + qrSize + 4, { align:'center' });
  doc.setFont('helvetica','normal');
  doc.setFontSize(7.5);
  doc.setTextColor(100);
  doc.text('Scan QR untuk menilai (skala 1-5 bintang)', qrX + qrSize/2, qrY + qrSize + 8, { align:'center' });

  // Notes column on the left of the QR
  doc.setFont('helvetica','bold');
  doc.setFontSize(10);
  doc.setTextColor(0, 61, 126);
  doc.text('KETERANGAN', M, afterTableY + 4);
  doc.setFont('helvetica','normal');
  doc.setFontSize(9.5);
  doc.setTextColor(50);
  const keteranganLines = doc.splitTextToSize(req.keterangan || '(tidak ada keterangan)', qrX - M - 8);
  doc.text(keteranganLines, M, afterTableY + 10);

  // ----- Signature block at the bottom -----
  let sigY = Math.max(afterTableY + qrSize + 16, H - 60);
  if(sigY + 50 > H - 14) sigY = H - 60;

  doc.setDrawColor(0, 168, 89);
  doc.setLineWidth(0.5);
  doc.line(M, sigY - 4, W - M, sigY - 4);

  const colW = (W - M*2 - 14) / 2;
  // Left column: Diserahkan oleh
  doc.setFont('helvetica','bold');
  doc.setFontSize(10);
  doc.setTextColor(0, 61, 126);
  doc.text('Diserahkan oleh,', M, sigY + 2);
  doc.setFont('helvetica','normal');
  doc.setTextColor(50);
  doc.setFontSize(9.5);
  doc.text('General Affairs Department', M, sigY + 7);
  doc.text('PT MRT Jakarta', M, sigY + 11.5);
  // signature space (line)
  doc.setDrawColor(180);
  doc.setLineWidth(0.3);
  doc.line(M, sigY + 38, M + colW - 8, sigY + 38);
  doc.setFont('helvetica','italic');
  doc.setFontSize(8.5);
  doc.setTextColor(120);
  doc.text('(Nama lengkap & tanda tangan)', M + 2, sigY + 43);
  if(req.nama_pic_ga){
    doc.setFont('helvetica','bold');
    doc.setFontSize(9.5);
    doc.setTextColor(50);
    doc.text(req.nama_pic_ga, M, sigY + 36);
  }

  // Right column: Diterima oleh
  const rx = M + colW + 14;
  doc.setFont('helvetica','bold');
  doc.setFontSize(10);
  doc.setTextColor(0, 61, 126);
  doc.text('Diterima oleh,', rx, sigY + 2);
  doc.setFont('helvetica','normal');
  doc.setTextColor(50);
  doc.setFontSize(9.5);
  doc.text(req.nama_pemesan || '(Nama Pemesan)', rx, sigY + 7);
  if(req.nama_kegiatan){
    doc.text(req.nama_kegiatan, rx, sigY + 11.5);
  }
  doc.setDrawColor(180);
  doc.setLineWidth(0.3);
  doc.line(rx, sigY + 38, rx + colW - 8, sigY + 38);
  doc.setFont('helvetica','italic');
  doc.setFontSize(8.5);
  doc.setTextColor(120);
  doc.text('(Nama lengkap & tanda tangan)', rx + 2, sigY + 43);

  // ----- Footer -----
  doc.setFontSize(7.5);
  doc.setTextColor(140);
  const issued = new Date().toLocaleString('id-ID', { day:'2-digit', month:'long', year:'numeric', hour:'2-digit', minute:'2-digit' });
  doc.text('Dicetak: ' + issued + ' · GA Hotline Portal · v1.4.0', W/2, H - 8, { align:'center' });

  // Save
  const safeCode = (req.kode_permintaan || 'tanda-terima').replace(/[^A-Za-z0-9_-]/g,'_');
  doc.save(`tanda-terima-${safeCode}.pdf`);
}

    <div class="field"><label>Kritik / Saran</label>
      <textarea class="textarea" id="ks" placeholder="Tuliskan masukan, kritik, atau apresiasi Anda..."></textarea></div>
    <button class="btn btn-primary" id="submit-rate" style="width:100%"><span class="material-symbols-rounded">send</span>Kirim Penilaian</button>
    <p class="text-sm muted center mt-4"><a href="#/">Kembali ke beranda</a></p>
  `;
  let val = 0;
  $$('.star').forEach(s => s.addEventListener('click', ()=>{
    val = Number(s.dataset.v);
    $$('.star').forEach(x => x.classList.toggle('filled', Number(x.dataset.v)<=val));
  }));
  $('#submit-rate').addEventListener('click', async () => {
    if(!val){ toast('Pilih skor kepuasan terlebih dahulu','warn'); return; }
    try{
      await db.insertRating({ request_id:id, rating:val, kritik_saran:$('#ks').value || null });
      body.innerHTML = `
        <div class="center">
          <div class="success-mark"><span class="material-symbols-rounded">check</span></div>
          <h3 style="margin:0 0 6px">Terima kasih!</h3>
          <p class="muted">Penilaian Anda telah kami terima dan akan menjadi bahan evaluasi tim GA.</p>
          <div class="mt-4"><a href="#/" class="btn btn-primary"><span class="material-symbols-rounded">home</span>Kembali ke Beranda</a></div>
        </div>
      `;
    }catch(err){ console.error(err); toast(err.message||'Gagal mengirim penilaian','error'); }
  });
}

/* ============================================================
   GLOBAL HELPERS exposed
   ============================================================ */
window.closeModal = closeModal;

/* ============================================================
   BOOT
   ============================================================ */
document.addEventListener('DOMContentLoaded', async () => {
  if(!SUPA_CONFIGURED){
    setTimeout(()=> toast('Berjalan dalam mode DEMO (data hanya di memori). Edit SUPABASE_URL & SUPABASE_ANON_KEY di index.html untuk aktifkan Supabase.','warn',7000), 600);
  }
  // v1.7: prime kategori cache so KATEGORI_KODE includes any custom categories
  try{ await refreshKategoriKode(); }catch(err){ console.warn('[boot kategori]', err); }
  route();
});

</script>
